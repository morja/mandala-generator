name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build macOS App
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build app
        run: |
          chmod +x build_app.sh
          ./build_app.sh

      - name: Sign app (ad-hoc)
        run: |
          codesign --force --deep --sign - "Mandala Generator.app"

      - name: Package app bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent "Mandala Generator.app" "Mandala-Generator.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Mandala Generator ${{ github.ref_name }}
          body: |
            ## Install

            1. Download **Mandala-Generator.zip** below and unzip it.
            2. Move **Mandala Generator.app** to your Applications folder.
            3. Double-click to open — macOS will block it the first time.
            4. Open **System Settings → Privacy & Security**, scroll down, click **Open Anyway**.
            5. Confirm by clicking **Open**.

            > Required once because the app is not notarised with Apple.

            ---
          generate_release_notes: true
          files: Mandala-Generator.zip
          fail_on_unmatched_files: true
